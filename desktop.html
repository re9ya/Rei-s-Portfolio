<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rei's Portfolio</title>
    <link rel="stylesheet" href="homescreen.css">
</head>
<body>
    <div class="desktop-container">
        <img src="Portfolio Assets/Line Base.png" alt="Desktop Background" class="desktop-background">
    </div>

    <main class="desktop">
        <div class="main-frame" id="home-frame">
            <img src="Portfolio Assets/Home/Homescreen Frame.png" alt="Home Frame">
            <span>Home</span>
        </div>
        <div class="desktop-icon">
            <div class="icon-item">
                <img src="Portfolio Assets/Home/Setting Icon.png" alt="Setting Icon">
                <span>Settings</span>
            </div>

            <div class="icon-item">
                <img src="Portfolio Assets/Home/Notepad App.png" alt="Notepad App Icon">
                <span>Notepad</span>
            </div>

            <div class="icon-item">
                <img src="Portfolio Assets/Home/App Icon.png" alt="Calculator App Icon">
                <span>Calculator</span>
            </div>
        </div>

    </main>
</body>
</html>
